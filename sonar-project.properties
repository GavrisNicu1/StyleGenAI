sonar.projectKey=StyleGenAI
sonar.projectName=StyleGenAI

# Sursa este folderul curent
sonar.sources=.

# --- ADĂUGĂRI PENTRU REZOLVAREA AVERTISMENTELOR ---

# 1. Rezolvă avertismentul legat de Python (setează versiunea folosită pe backend)
sonar.python.version=3.10

# 2. Rezolvă eroarea "Missing blame information" (forțează citirea istoricului Git)
sonar.scm.provider=git

# 3. Rezolvă avertismentul legat de fișierele de test
# Dacă ai un folder unde îți ții testele scrise de tine (ex: folderul "tests"), decomentează linia de mai jos:
# sonar.tests=tests
# Dacă NU ai scris încă teste unitare, lasă linia comentată.

# ---------------------------------------------------

# Excludem folderele de sistem, librariile si documentele de licenta
sonar.exclusions=**/node_modules/**, **/venv/**, **/__pycache__/**, **/.expo/**, **/licenta_docs/**, **/*.pdf, **/*.db, **/*.sqlite3